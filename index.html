<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常管理 · 通用版</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <header class="app-header"><h1>⚔️ 日常管理</h1></header>
    <nav class="tab-nav" id="tabNav">
        <button class="active" data-tab="home">🏠 首页</button>
        <button data-tab="record">📋 任务记录</button>
        <button data-tab="analysis">📊 盈亏分析</button>
        <button data-tab="settings">⚙️ 设置</button>
    </nav>

    <!-- 悬浮加号按钮 -->
    <button class="fab" id="fabBtn">+</button>
    <div class="fab-menu" id="fabMenu">
        <button id="btn-add-role">👤 添加角色</button>
        <button id="btn-add-task">📋 添加任务</button>
        <button id="btn-manage-tasks">🗂️ 管理任务</button>
        <button id="btn-manage-roles">👥 角色管理</button>
    </div>

    <!-- 首页 -->
    <div class="tab-content active" id="tab-home">
        <div class="section-title">我的角色 <span class="badge" id="roleCountBadge">0</span></div>
        <div class="role-cards" id="roleCardsContainer"></div>
        <div class="stat-cards" id="statCardsContainer"></div>
        <div class="home-panels">
            <div class="home-panel glass-card" id="recentActivityPanel">
                <h3>📌 最近活动</h3>
                <div id="recentActivityList"></div>
            </div>
            <div class="home-panel glass-card">
                <h3>🎋 今日运势</h3>
                <div class="fortune-area">
                    <button class="fortune-btn" id="fortuneBtn">求一支签</button>
                    <div class="fortune-result" id="fortuneResult"></div>
                </div>
            </div>
            <div class="home-panel glass-card">
                <h3>💰 本周盈亏简报</h3>
                <div id="weekReport"></div>
            </div>
        </div>
        <div class="quote-text" id="dailyQuote"></div>
    </div>

    <!-- 任务记录 -->
    <div class="tab-content" id="tab-record">
        <div class="task-record-layout">
            <div class="role-select-panel glass-card">
                <h3>选择角色</h3>
                <div id="recordRoleList"></div>
            </div>
            <div class="task-view-panel glass-card">
                <div class="view-toggle">
                    <button class="active" data-view="day">日视图</button>
                    <button data-view="week">周视图</button>
                    <button data-view="month">月视图</button>
                    <input type="date" id="recordDatePicker" style="margin-left:auto;">
                </div>
                <div class="filter-bar">
                    <select id="filterCategory"><option value="all">全部分类</option></select>
                    <select id="filterType"><option value="all">全部类型</option></select>
                    <select id="filterStatus"><option value="all">全部状态</option></select>
                </div>
                <div id="taskViewContent">
                    <p style="color:var(--text-light);text-align:center;padding:40px;">请先在左侧选择角色</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 盈亏分析 -->
    <div class="tab-content" id="tab-analysis">
        <div class="analysis-filter">
            <div class="filter-time-group">
                <label style="font-size:0.85rem; color:var(--text-light);">时间</label>
                <select id="analysisPeriod">
                    <option value="day">今日</option>
                    <option value="week" selected>本周</option>
                    <option value="month">本月</option>
                    <option value="custom">自定义</option>
                </select>
                <span id="customDateLabel" style="display:none;">
                    <input type="date" id="analysisStart"> ~
                    <input type="date" id="analysisEnd">
                </span>
            </div>
            <div class="filter-role-group">
                <div style="font-size:0.85rem; color:var(--text-light); margin-bottom:6px;">选择角色</div>
                <div class="role-cards" id="analysisRoleCards"></div>
            </div>
        </div>
        <div class="summary-cards" id="analysisSummary"></div>
        <div class="chart-row" id="analysisCharts" style="display:block;"></div>
    </div>

    <!-- 设置 -->
    <div class="tab-content" id="tab-settings">
        <div class="form-section glass-card">
            <h3>🎨 主题风格</h3>
            <div class="theme-options-container" id="themeOptions">
                <div class="theme-option" data-theme="default"><span class="theme-dot" style="background:linear-gradient(135deg,#6c5ce7,#a29bfe);"></span>紫韵</div>
                <div class="theme-option" data-theme="dark"><span class="theme-dot" style="background:linear-gradient(135deg,#2d1b69,#16213e);"></span>暗夜</div>
                <div class="theme-option" data-theme="mint"><span class="theme-dot" style="background:linear-gradient(135deg,#00b894,#55efc4);"></span>薄荷</div>
                <div class="theme-option" data-theme="warm"><span class="theme-dot" style="background:linear-gradient(135deg,#e17055,#fab1a0);"></span>暖阳</div>
                <div class="theme-option" data-theme="wuxia"><span class="theme-dot" style="background:linear-gradient(135deg,#c9a96e,#8b7750);"></span>侠影</div>
            </div>
        </div>
        <div class="form-section glass-card">
            <h3>⚙️ 通用设置</h3>
            <div class="form-row">
                <label>货币单位 <input type="text" id="currencyUnit" placeholder="金" value="金"></label>
                <label>进位单位 <input type="text" id="bigUnit" placeholder="砖" value="砖"></label>
                <label>进位值 <input type="number" id="unitRate" value="10000"></label>
            </div>
            <p style="font-size:0.75rem;color:var(--text-light);">例：小单位=金，大单位=砖，进位=10000 → 10000金=1砖</p>
        </div>
        <div class="form-section glass-card">
            <h3>💾 数据管理</h3>
            <button class="btn btn-primary" id="btn-export">📥 导出数据</button>
            <button class="btn" style="background:var(--warning);color:#fff;margin-left:8px;" id="btn-import">📤 导入数据</button>
            <p style="font-size:0.75rem;color:var(--text-light);margin-top:8px;">导出为JSON文件备份；导入将覆盖现有数据，请先备份。</p>
        </div>
    </div>

    <!-- 模态容器 -->
    <div id="modalContainer"></div>

    <script src="script.js"></script>
</body>
</html>
